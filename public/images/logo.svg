<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 345" width="300" height="345">
  <defs>
    <linearGradient id="wGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8412a"/>
      <stop offset="50%" stop-color="#c62a8a"/>
      <stop offset="100%" stop-color="#6b35a8"/>
    </linearGradient>
    <filter id="wDrop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#0d2240" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- White circle fill -->
  <circle cx="150" cy="148" r="124" fill="#ffffff"/>

  <!-- Navy ring -->
  <circle cx="150" cy="148" r="125" fill="none" stroke="#0d2240" stroke-width="13"/>

  <!-- W lettermark using gradient -->
  <path d="M 76,78 L 114,184 L 148,106 L 152,106 L 186,184 L 224,78"
        fill="none"
        stroke="url(#wGrad)"
        stroke-width="30"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#wDrop)"/>

  <!-- WORKBASE bold text below -->
  <text x="150" y="324"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="30"
        font-weight="900"
        letter-spacing="5"
        text-anchor="middle"
        fill="#0d2240">WORKBASE</text>
</svg>
