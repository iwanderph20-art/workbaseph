<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340">
  <!-- Orange circle ring -->
  <circle cx="150" cy="138" r="118" stroke="#f47c20" stroke-width="9" fill="none"/>

  <!-- Left checkmark (navy) -->
  <polyline points="72,112 110,176 150,82"
    fill="none" stroke="#0d2240" stroke-width="22"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right checkmark (navy, overlapping) -->
  <polyline points="114,132 152,188 226,68"
    fill="none" stroke="#0d2240" stroke-width="22"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- WorkBase PH bold text -->
  <text x="150" y="296"
    text-anchor="middle"
    fill="#0d2240"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="27"
    font-weight="900"
    letter-spacing="0.5">WorkBase PH</text>

  <!-- Tagline -->
  <text x="150" y="320"
    text-anchor="middle"
    fill="#1a8a7a"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14"
    font-style="italic"
    letter-spacing="0.3">Job Matching, Reimagined.</text>
</svg>
