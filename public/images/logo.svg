<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350">
  <!-- Orange circle ring — thick, prominent -->
  <circle cx="150" cy="140" r="116" stroke="#f47c20" stroke-width="12" fill="none"/>

  <!-- Left checkmark: bold navy tick -->
  <polyline points="68,115 108,178 152,80"
    fill="none" stroke="#0d2240" stroke-width="26"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right checkmark: bold navy tick, overlapping -->
  <polyline points="114,136 154,192 228,66"
    fill="none" stroke="#0d2240" stroke-width="26"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- WorkBase PH — bold text below circle -->
  <text x="150" y="300"
    text-anchor="middle"
    fill="#0d2240"
    font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif"
    font-size="28"
    font-weight="900"
    letter-spacing="1">WorkBase PH</text>

  <!-- Tagline — teal italic -->
  <text x="150" y="326"
    text-anchor="middle"
    fill="#1a8a7a"
    font-family="Georgia,'Times New Roman',serif"
    font-size="14.5"
    font-style="italic"
    letter-spacing="0.5">Job Matching, Reimagined.</text>
</svg>
