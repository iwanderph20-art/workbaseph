<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — WorkBase PH</title>
  <link rel="icon" href="images/logo.svg?v=3" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* ── Specialist profile builder styles (matches landing palette) ── */
    .ps { background:var(--white);border:1px solid var(--gray-light);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem; }
    .ps h3 { color:var(--navy);font-size:1rem;display:flex;align-items:center;gap:0.55rem;flex-wrap:wrap;margin-bottom:0.3rem; }
    .ps .sdesc { color:var(--gray);font-size:0.85rem;margin-bottom:1.1rem;line-height:1.6; }

    .badge-rec  { font-size:0.65rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--teal);background:var(--teal-light);padding:0.12rem 0.5rem;border-radius:var(--radius-pill); }
    .badge-opt  { font-size:0.65rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--gray);background:var(--bg);border:1px solid var(--gray-light);padding:0.12rem 0.5rem;border-radius:var(--radius-pill); }

    .tg { display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.85rem; }
    .tbtn { padding:0.4rem 0.9rem;border-radius:var(--radius-pill);border:2px solid var(--gray-light);background:var(--white);color:var(--gray-dark);font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:inherit; }
    .tbtn:hover { border-color:var(--navy);color:var(--navy); }
    .tbtn.on { background:var(--navy);color:white;border-color:var(--navy); }

    .upload-z { border:2px dashed var(--gray-light);border-radius:var(--radius);padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;background:var(--bg);position:relative; }
    .upload-z:hover { border-color:var(--orange);background:#fff9f5; }
    .upload-z input[type=file] { position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%; }
    .upload-z p { margin:0;font-size:0.82rem;color:var(--gray); }
    .upload-z strong { color:var(--navy); }

    .vopt { display:flex;gap:0.85rem;padding:0.9rem 1.1rem;border:2px solid var(--gray-light);border-radius:var(--radius);margin-bottom:0.6rem;cursor:pointer;align-items:flex-start;transition:border-color 0.15s; }
    .vopt:hover { border-color:var(--orange); }
    .vopt.sel { border-color:var(--orange);background:#fff9f5; }
    .vopt input[type=radio] { margin-top:3px;accent-color:var(--orange);flex-shrink:0; }
    .vopt label { cursor:pointer; }
    .vopt label strong { display:block;color:var(--navy);margin-bottom:0.15rem;font-size:0.875rem; }
    .vopt label span { font-size:0.8rem;color:var(--gray);line-height:1.5; }
    .vurl { display:none;margin-top:0.6rem; }
    .vurl.show { display:block; }

    .infobox { background:var(--bg);border-left:3px solid var(--teal);border-radius:0 var(--radius) var(--radius) 0;padding:0.8rem 1rem;margin-top:0.65rem; }
    .infobox p { margin:0;font-size:0.8rem;color:var(--gray-dark);line-height:1.6; }
    .warnbox { background:#fef9ec;border-left:3px solid #e9a800;border-radius:0 var(--radius) var(--radius) 0;padding:0.8rem 1rem;margin-top:0.65rem; }
    .warnbox p { margin:0;font-size:0.8rem;color:#5a4500;line-height:1.6; }

    /* Calendar */
    .calgrid { display:grid;grid-template-columns:auto repeat(7,1fr);gap:3px;font-size:0.78rem; }
    .calh { font-weight:700;color:var(--navy);text-align:center;padding:0.3rem 0; }
    .call { font-size:0.75rem;color:var(--gray);display:flex;align-items:center;padding-right:0.4rem;white-space:nowrap; }
    .calc { aspect-ratio:1;border-radius:5px;border:1.5px solid var(--gray-light);background:var(--bg);cursor:pointer;transition:all 0.15s; }
    .calc:hover { border-color:var(--orange);background:#fff9f5; }
    .calc.av { background:var(--navy);border-color:var(--navy); }
    .calc.pt { background:var(--teal-light);border-color:var(--teal); }

    /* Form elements */
    .fl { font-size:0.82rem;font-weight:600;color:var(--navy);display:block;margin-bottom:0.3rem; }
    .fi,.fs,.ft { width:100%;box-sizing:border-box;border:1.5px solid var(--gray-light);border-radius:var(--radius);padding:0.55rem 0.8rem;font-size:0.875rem;color:var(--gray-dark);background:var(--white);font-family:inherit;transition:border-color 0.15s; }
    .fi:focus,.fs:focus,.ft:focus { outline:none;border-color:var(--orange); }
    .ft { resize:vertical;min-height:75px; }
    .fr { display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;margin-bottom:0.85rem; }
    @media(max-width:580px){ .fr{ grid-template-columns:1fr; } }

    /* Proof of Readiness section */
    .proof-wrap { background:var(--navy);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem; }
    .proof-wrap > h3 { color:white;font-size:1rem;display:flex;align-items:center;gap:0.55rem;margin-bottom:0.35rem; }
    .proof-wrap > p { color:rgba(255,255,255,0.65);font-size:0.83rem;margin-bottom:1.25rem;line-height:1.6; }
    .pi { background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:var(--radius);padding:1.35rem;margin-bottom:0.85rem; }
    .pi:last-child { margin-bottom:0; }
    .pi h4 { color:white;margin:0 0 0.25rem;font-size:0.875rem;display:flex;align-items:center;gap:0.5rem; }
    .pi .pd { color:rgba(255,255,255,0.6);font-size:0.8rem;margin:0 0 0.8rem;line-height:1.6; }
    .pi .upload-z { background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.18); }
    .pi .upload-z:hover { border-color:var(--orange);background:rgba(244,124,32,0.08); }
    .pi .upload-z p, .pi .upload-z strong { color:rgba(255,255,255,0.65); }
    .pi .fi,.pi .fs { background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.2);color:white; }
    .pi .fi::placeholder { color:rgba(255,255,255,0.3); }
    .pi .fi:focus,.pi .fs:focus { border-color:var(--orange); }
    .pi .fl { color:rgba(255,255,255,0.8); }
    .pi .warnbox { background:rgba(233,168,0,0.1);border-left-color:#e9a800; }
    .pi .warnbox p { color:rgba(255,255,255,0.7); }
    .pi .infobox { background:rgba(255,255,255,0.05);border-left-color:var(--teal); }
    .pi .infobox p { color:rgba(255,255,255,0.6); }
    .pi .vopt { background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.15); }
    .pi .vopt:hover { border-color:var(--orange); }
    .pi .vopt.sel { border-color:var(--orange);background:rgba(244,124,32,0.08); }
    .pi .vopt label strong { color:white; }
    .pi .vopt label span { color:rgba(255,255,255,0.5); }
    .pi .fr { margin-bottom:0; }
    .pnum { width:22px;height:22px;background:var(--orange);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:900;flex-shrink:0; }

    /* Peripherals */
    .perilist { display:flex;flex-direction:column;gap:0.55rem; }
    .peri { display:flex;align-items:flex-start;gap:0.75rem;padding:0.8rem 0.95rem;border:1.5px solid var(--gray-light);border-radius:var(--radius);cursor:pointer;transition:border-color 0.15s; }
    .peri:hover { border-color:var(--orange); }
    .peri input[type=checkbox] { accent-color:var(--orange);width:15px;height:15px;margin-top:2px;flex-shrink:0; }
    .peri .pl { font-size:0.845rem;color:var(--gray-dark);line-height:1.45; }
    .peri .pl strong { color:var(--navy);display:block; }

    /* Progress bar in dashboard */
    .prof-progress { background:var(--bg);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem; }
    .prog-track { flex:1;background:var(--gray-light);border-radius:99px;height:7px; }
    .prog-fill { height:100%;border-radius:99px;background:var(--orange);transition:width 0.4s; }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="images/logo.svg?v=3" alt="WorkBase PH" style="height:136px;width:auto" />
    </a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
    </div>
    <div class="nav-actions">
      <div class="nav-avatar" id="navAvatar" title="" onclick="showTab('profile')" style="cursor:pointer">?</div>
      <button class="btn btn-outline btn-sm" onclick="logout()">Log Out</button>
    </div>
  </div>
</nav>

<!-- LOGIN REQUIRED -->
<div id="loginRequired" style="display:none;min-height:calc(100vh - 73px);align-items:center;justify-content:center;padding:3rem;text-align:center">
  <div>
    <div style="font-size:3rem;margin-bottom:1rem">🔒</div>
    <h2>Login Required</h2>
    <p class="text-gray mb-3">Please log in to access your dashboard.</p>
    <a href="login.html" class="btn btn-primary">Log In</a>
    <a href="signup.html" class="btn btn-outline" style="margin-left:0.75rem">Sign Up Free</a>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardContent" style="display:none">
  <div class="dashboard-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div style="padding:1.5rem 1.75rem;border-bottom:1.5px solid var(--gray-light)">
        <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.65rem">
          <div id="sidebarAvatar" style="width:44px;height:44px;border-radius:50%;background:var(--orange);color:white;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:bold;flex-shrink:0">?</div>
          <div>
            <div id="sidebarName" style="font-weight:700;font-size:0.92rem"></div>
            <div id="sidebarRole" style="font-size:0.78rem;color:var(--gray);text-transform:capitalize"></div>
          </div>
        </div>
        <div id="sidebarVerified"></div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="dashboard-main">

      <!-- OVERVIEW TAB -->
      <div id="tabOverview" class="tab-pane active">
        <div class="dashboard-header">
          <h1 id="welcomeMsg">Dashboard</h1>
          <p id="welcomeSub" class="text-gray"></p>
        </div>
        <div class="stat-cards" id="statCards"></div>
        <div id="overviewContent"></div>
      </div>

      <!-- MY JOBS TAB (employer only) -->
      <div id="tabMyJobs" class="tab-pane">
        <div class="dashboard-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
          <div><h1>My Job Postings</h1><p class="text-gray">Manage your active and past listings</p></div>
          <a href="post-job.html" class="btn btn-primary">+ Post New Job</a>
        </div>
        <div id="myJobsList"></div>
      </div>

      <!-- PROFILE TAB — FULL BUILDER FOR SPECIALISTS, SIMPLE FOR EMPLOYERS -->
      <div id="tabProfile" class="tab-pane">
        <div class="dashboard-header">
          <h1>My Profile</h1>
          <p class="text-gray" id="profileSubtitle">Update your information</p>
        </div>
        <div id="profileAlert"></div>
        <div id="profileContent"></div>
      </div>

    </main>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  let currentUser = null;
  const calState = {};

  document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.isLoggedIn()) {
      document.getElementById('loginRequired').style.display = 'flex';
      return;
    }
    try {
      currentUser = await apiFetch('/auth/me');
      Auth.setSession(Auth.getToken(), currentUser);
      initDashboard();
    } catch {
      Auth.clear();
      window.location.href = 'login.html';
    }
  });

  function logout() { Auth.clear(); window.location.href = 'index.html'; }

  function initDashboard() {
    document.getElementById('dashboardContent').style.display = 'block';
    document.getElementById('loginRequired').style.display = 'none';

    const isEmployer = currentUser.role === 'employer';
    const initial = currentUser.full_name.charAt(0).toUpperCase();

    document.getElementById('navAvatar').textContent = initial;
    document.getElementById('navAvatar').title = currentUser.full_name;
    document.getElementById('sidebarAvatar').textContent = initial;
    document.getElementById('sidebarName').textContent = currentUser.full_name;
    document.getElementById('sidebarRole').textContent = isEmployer ? '🏢 Employer' : '💼 Specialist';
    document.getElementById('sidebarVerified').innerHTML = currentUser.is_verified
      ? '<span class="verified-badge" style="font-size:.78rem">✓ Verified Account</span>'
      : '<span style="font-size:.78rem;color:var(--gray)">⏳ Pending Verification</span>';

    const hour = new Date().getHours();
    const greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
    document.getElementById('welcomeMsg').textContent = `${greeting}, ${currentUser.full_name.split(' ')[0]}! 👋`;
    document.getElementById('welcomeSub').textContent = isEmployer
      ? 'Here\'s an overview of your hiring activity.'
      : 'Here\'s a snapshot of your profile and matching status.';

    const nav = document.getElementById('sidebarNav');
    if (isEmployer) {
      nav.innerHTML = `
        <div class="sidebar-section">Main</div>
        <a href="#" class="active" onclick="showTab('overview');return false"><span class="icon">📊</span> Overview</a>
        <a href="#" onclick="showTab('myJobs');return false"><span class="icon">📋</span> My Job Posts</a>
        <a href="post-job.html"><span class="icon">➕</span> Post a Job</a>
        <div class="sidebar-section">Account</div>
        <a href="#" onclick="showTab('profile');return false"><span class="icon">👤</span> My Profile</a>
        <a href="#" onclick="logout()"><span class="icon">🚪</span> Log Out</a>`;
    } else {
      nav.innerHTML = `
        <div class="sidebar-section">Main</div>
        <a href="#" class="active" onclick="showTab('overview');return false"><span class="icon">📊</span> Overview</a>
        <div class="sidebar-section">Account</div>
        <a href="#" onclick="showTab('profile');return false"><span class="icon">👤</span> My Profile</a>
        <a href="#" onclick="logout()"><span class="icon">🚪</span> Log Out</a>`;
    }

    if (isEmployer) {
      loadEmployerData();
      renderEmployerProfile();
    } else {
      loadSpecialistOverview();
      renderSpecialistProfile();
    }
  }

  function showTab(tab) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
    const map = { overview:'tabOverview', myJobs:'tabMyJobs', profile:'tabProfile' };
    const pane = document.getElementById(map[tab]);
    if (pane) pane.classList.add('active');
    document.querySelectorAll('.sidebar-nav a').forEach(a => {
      if ((a.getAttribute('onclick')||'').includes(`'${tab}'`)) a.classList.add('active');
    });
  }

  /* ═══════════════════════════════════════════
     EMPLOYER
  ═══════════════════════════════════════════ */
  async function loadEmployerData() {
    try {
      const jobs = await apiFetch('/jobs/employer/my-jobs');
      const total = jobs.length, open = jobs.filter(j=>j.status==='open').length;
      const totalApps = jobs.reduce((a,j)=>a+(j.application_count||0),0);
      document.getElementById('statCards').innerHTML = `
        <div class="stat-card"><div class="num">${total}</div><div class="lbl">Jobs Posted</div></div>
        <div class="stat-card"><div class="num">${open}</div><div class="lbl">Active Listings</div></div>
        <div class="stat-card"><div class="num">${totalApps}</div><div class="lbl">Total Applicants</div></div>
        <div class="stat-card"><div class="num">${total-open}</div><div class="lbl">Closed Jobs</div></div>`;
      document.getElementById('overviewContent').innerHTML = jobs.length === 0 ? `
        <div class="empty-state">
          <div class="icon">📋</div><h3>No jobs posted yet</h3>
          <p>Post your first role and start receiving matches from verified Filipino specialists.</p>
          <a href="post-job.html" class="btn btn-primary mt-2">Post Your First Job →</a>
        </div>` : `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem">
          <h3>Recent Job Posts</h3>
          <a href="#" onclick="showTab('myJobs');return false" class="btn btn-outline btn-sm">View All →</a>
        </div>
        <div style="display:flex;flex-direction:column;gap:0.75rem">${jobs.slice(0,3).map(renderJobRow).join('')}</div>`;
      document.getElementById('myJobsList').innerHTML = jobs.length === 0
        ? `<div class="empty-state"><div class="icon">📋</div><h3>No jobs posted yet</h3><a href="post-job.html" class="btn btn-primary mt-2">Post a Job →</a></div>`
        : `<div style="display:flex;flex-direction:column;gap:0.75rem">${jobs.map(renderJobRow).join('')}</div>`;
    } catch {
      document.getElementById('overviewContent').innerHTML = '<div class="alert alert-error">Error loading data. Please refresh.</div>';
    }
  }

  function renderJobRow(job) {
    const sc={open:'#16a34a',in_progress:'#2563eb',closed:'#dc2626'};
    const sb={open:'#f0fdf4',in_progress:'#eff6ff',closed:'#fef2f2'};
    return `<div style="background:white;border:1.5px solid var(--gray-light);border-radius:var(--radius);padding:1.1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.85rem">
      <div style="flex:1;min-width:180px">
        <div style="font-weight:700;margin-bottom:0.2rem">${escHtml(job.title)}</div>
        <div class="job-meta"><span>${escHtml(job.category)}</span><span>📍${escHtml(job.location)}</span><span>⏱${timeAgo(job.created_at)}</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:0.85rem;flex-wrap:wrap">
        <div style="text-align:center"><div style="font-weight:700;font-size:1.1rem;color:var(--navy)">${job.application_count||0}</div><div style="font-size:0.75rem;color:var(--gray)">Applicants</div></div>
        <span style="background:${sb[job.status]};color:${sc[job.status]};padding:.25rem .7rem;border-radius:50px;font-size:.78rem;font-weight:700;text-transform:capitalize">${job.status}</span>
        <a href="jobs.html?id=${job.id}" class="btn btn-outline btn-sm">View</a>
      </div>
    </div>`;
  }

  function renderEmployerProfile() {
    document.getElementById('profileSubtitle').textContent = 'Update your company information';
    document.getElementById('profileContent').innerHTML = `
      <div class="form-card" style="max-width:600px">
        <form id="profileForm">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="profileName" value="${escHtml(currentUser.full_name||'')}" required />
          </div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="profileEmail" value="${escHtml(currentUser.email||'')}" disabled style="background:var(--bg);cursor:not-allowed" />
            <div class="form-hint">Email cannot be changed</div>
          </div>
          <div class="form-group">
            <label class="form-label">About / Company Description</label>
            <textarea id="profileBio" rows="4" placeholder="Tell specialists about your company and what you're looking for…">${escHtml(currentUser.bio||'')}</textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Location</label>
            <input type="text" id="profileLocation" value="${escHtml(currentUser.location||'')}" placeholder="e.g. New York, USA" />
          </div>
          <button type="submit" class="btn btn-hire" id="saveProfileBtn">Save Changes</button>
        </form>
      </div>`;
    bindProfileSave();
  }

  /* ═══════════════════════════════════════════
     SPECIALIST OVERVIEW
  ═══════════════════════════════════════════ */
  function loadSpecialistOverview() {
    document.getElementById('statCards').innerHTML = `
      <div class="stat-card"><div class="num" id="profilePct">0%</div><div class="lbl">Profile Strength</div></div>
      <div class="stat-card"><div class="num">—</div><div class="lbl">Active Matches</div></div>
      <div class="stat-card"><div class="num">—</div><div class="lbl">Profile Views</div></div>
      <div class="stat-card"><div class="num" id="badgeStatus">—</div><div class="lbl">WorkBase Verified</div></div>`;

    document.getElementById('overviewContent').innerHTML = `
      <div style="background:var(--navy);border-radius:var(--radius);padding:1.75rem;color:white;margin-bottom:1.25rem">
        <h3 style="color:white;margin-bottom:0.5rem">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex-shrink:0"><path d="M12 2l2.5 4.5 5 .75-3.6 3.5.85 5-4.75-2.5L7.25 15.75l.85-5L4.5 7.25l5-.75L12 2z" fill="#f47c20"/></svg>
          Earn Your WorkBase Verified Badge
        </h3>
        <p style="color:rgba(255,255,255,0.7);font-size:0.875rem;margin-bottom:1.25rem;line-height:1.6">Verified specialists are prioritised in employer searches. Complete your profile to unlock the badge.</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0.75rem;margin-bottom:1.25rem">
          ${['Speed test (primary + backup)','Workstation photo','System specs screenshot','Get-to-Know-Me video link'].map((t,i)=>`
          <div style="background:rgba(255,255,255,0.07);border-radius:8px;padding:0.85rem;display:flex;gap:0.65rem;align-items:flex-start">
            <div style="width:22px;height:22px;background:var(--orange);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:900;color:white;flex-shrink:0">${i+1}</div>
            <span style="font-size:0.82rem;color:rgba(255,255,255,0.8)">${t}</span>
          </div>`).join('')}
        </div>
        <a href="#" onclick="showTab('profile');return false" class="btn btn-find">Complete My Profile →</a>
      </div>
      <div style="background:var(--bg);border-radius:var(--radius);padding:1.25rem">
        <p style="margin:0;font-size:0.875rem;color:var(--gray-dark)"><strong style="color:var(--navy)">How matching works:</strong> Once your profile is complete, our team reviews it and begins matching you with relevant employers. You'll be notified by email when an employer expresses interest. You don't apply — you get found.</p>
      </div>`;
  }

  /* ═══════════════════════════════════════════
     SPECIALIST PROFILE BUILDER

  /* ── Toggle buttons ── */
  function initToggles() {
    document.getElementById('workTypeGroup').querySelectorAll('.tbtn').forEach(btn => {
      btn.addEventListener('click', () => { btn.classList.toggle('on'); updateProg(); });
    });
    document.getElementById('statusGroup').querySelectorAll('.tbtn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('statusGroup').querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on'); updateProg();
      });
    });
  }

  /* ── Calendar ── */
  function initCalendar() {
    const slots = ['Morning 6am–12pm','Afternoon 12–6pm','Evening 6–10pm'];
    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const grid = document.getElementById('calGrid');
    slots.forEach(s => {
      const lbl = document.createElement('div'); lbl.className='call'; lbl.textContent=s; grid.appendChild(lbl);
      days.forEach(d => {
        const k=s+d; calState[k]=0;
        const c = document.createElement('div'); c.className='calc';
        c.addEventListener('click',()=>{ calState[k]=(calState[k]+1)%3; c.className='calc'+(calState[k]===1?' av':calState[k]===2?' pt':''); updateProg(); });
        grid.appendChild(c);
      });
    });
  }

  /* ── File upload ── */
  function handleUp(input, previewId) {
    if (!input.files||!input.files[0]) return;
    if (input.files[0].size > 5*1024*1024) { alert('File must be under 5MB.'); return; }
    const r = new FileReader();
    r.onload = e => {
      const w=document.getElementById(previewId);
      w.querySelector('img').src=e.target.result;
      w.style.display='block';
      updateProg();
    };
    r.readAsDataURL(input.files[0]);
  }

  function prefillFromUser() {
    if (!currentUser) return;
    const s = n => document.getElementById(n);
    if(s('spName')) s('spName').value = currentUser.full_name||'';
    if(s('spLocation')) s('spLocation').value = currentUser.location||'';
    if(s('spBio')) s('spBio').value = currentUser.bio||'';
    if(s('spSkills')) s('spSkills').value = currentUser.skills||'';
    document.querySelectorAll('.fi,.ft,.fs').forEach(el=>el.addEventListener('input',updateProg));
    updateProg();
  }

  /* ── Progress ── */
  function updateProg() {
    let score=0, total=8;
    const g = id => document.getElementById(id);
    if (g('spName')&&g('spName').value.trim()) score++;
    if (document.getElementById('workTypeGroup')&&document.getElementById('workTypeGroup').querySelector('.on')) score++;
    if (Object.values(calState).some(v=>v>0)) score++;
    if (g('videoLink')&&g('videoLink').value.trim()) score++;
    if (g('spPrimary')&&g('spPrimary').files.length>0) score++;
    if (g('sysFile')&&g('sysFile').files.length>0) score++;
    const peris=['peri-webcam','peri-headset','peri-monitor','peri-ups'];
    if (peris.some(id=>g(id)&&g(id).checked)) score++;
    const pct = Math.round((score/total)*100);
    if(g('progressFill')) g('progressFill').style.width=pct+'%';
    if(g('progressLabel')) g('progressLabel').textContent=pct+'%';
    if(g('profilePct')) g('profilePct').textContent=pct+'%';
    if(g('badgeStatus')) g('badgeStatus').textContent=pct>=75?'✓ Earned':'Incomplete';
  }

  /* ── Save specialist (basic fields to API, uploads front-end only for now) ── */
  async function saveSpecialistProfile() {
    const g = id => document.getElementById(id);
    const name = g('spName') ? g('spName').value.trim() : '';
    if (!name) { alert('Please enter your full name.'); return; }
    const alertBox = document.getElementById('profileAlert');
    try {
      const updated = await apiFetch('/auth/profile', {
        method:'PUT',
        body: JSON.stringify({
          full_name: name,
          bio: g('spBio')?g('spBio').value:'',
          skills: g('spSkills')?g('spSkills').value:'',
          location: g('spLocation')?g('spLocation').value:''
        })
      });
      currentUser = {...currentUser,...updated};
      Auth.setSession(Auth.getToken(), currentUser);
      document.getElementById('sidebarName').textContent = updated.full_name;
      document.getElementById('navAvatar').textContent = updated.full_name.charAt(0).toUpperCase();
      document.getElementById('sidebarAvatar').textContent = updated.full_name.charAt(0).toUpperCase();
      showAlert(alertBox,'Profile saved! Our team will review it and reach out when you\'re matched with an employer.','success');
      window.scrollTo({top:0,behavior:'smooth'});
    } catch(err) {
      showAlert(alertBox, err.message||'Failed to save profile. Please try again.');
    }
  }

  /* ── Employer profile form ── */
  function bindProfileSave() {
    document.getElementById('profileForm').addEventListener('submit', async e => {
      e.preventDefault();
      const alertBox = document.getElementById('profileAlert');
      const btn = document.getElementById('saveProfileBtn');
      setLoading(btn,true,'Save Changes');
      try {
        const updated = await apiFetch('/auth/profile', {
          method:'PUT',
          body: JSON.stringify({
            full_name: document.getElementById('profileName').value,
            bio: document.getElementById('profileBio').value,
            skills: '',
            location: document.getElementById('profileLocation').value
          })
        });
        currentUser = {...currentUser,...updated};
        Auth.setSession(Auth.getToken(), currentUser);
        showAlert(alertBox,'Profile updated successfully!','success');
        document.getElementById('sidebarName').textContent = updated.full_name;
        document.getElementById('navAvatar').textContent = updated.full_name.charAt(0).toUpperCase();
        document.getElementById('sidebarAvatar').textContent = updated.full_name.charAt(0).toUpperCase();
      } catch(err) {
        showAlert(alertBox, err.message||'Failed to save profile.');
      } finally {
        setLoading(btn,false,'Save Changes');
      }
    });
  }
</script>
